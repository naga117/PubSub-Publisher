name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Resolve release version
        id: vars
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "tag_version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate tag version matches app version
        env:
          TAG_VERSION: ${{ steps.vars.outputs.tag_version }}
        run: |
          APP_VERSION="$(python - <<'PY'
          import re
          from pathlib import Path

          text = Path("pubsub_publisher/__init__.py").read_text(encoding="utf-8")
          match = re.search(r'__version__\s*=\s*"([^"]+)"', text)
          print(match.group(1) if match else "")
          PY
          )"

          if [ -z "${APP_VERSION}" ]; then
            echo "Could not read __version__ from pubsub_publisher/__init__.py"
            exit 1
          fi

          if [ "${APP_VERSION}" != "${TAG_VERSION}" ]; then
            echo "Tag version (${TAG_VERSION}) does not match app version (${APP_VERSION})"
            exit 1
          fi

      - name: Build release notes from changelog
        env:
          TAG_VERSION: ${{ steps.vars.outputs.tag_version }}
        run: |
          python scripts/extract_changelog.py "${TAG_VERSION}" > release_notes.md

      - name: Build macOS app bundle
        run: |
          python build_pyinstaller.py

      - name: Package downloadable artifact
        env:
          TAG_VERSION: ${{ steps.vars.outputs.tag_version }}
        run: |
          APP_PATH="dist-launcher/PubSub Publisher.app"
          ZIP_NAME="PubSub-Publisher-macOS-v${TAG_VERSION}.zip"

          if [ ! -d "${APP_PATH}" ]; then
            echo "Expected app bundle was not found at ${APP_PATH}"
            exit 1
          fi

          ditto -c -k --keepParent "${APP_PATH}" "${ZIP_NAME}"
          shasum -a 256 "${ZIP_NAME}" > "${ZIP_NAME}.sha256"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.vars.outputs.tag_version }}
          body_path: release_notes.md
          files: |
            PubSub-Publisher-macOS-v${{ steps.vars.outputs.tag_version }}.zip
            PubSub-Publisher-macOS-v${{ steps.vars.outputs.tag_version }}.zip.sha256
          fail_on_unmatched_files: true
